{% extends 'base.html' %}

{% block title %}{% if form.instance.pk %}Editar{% else %}Nuevo{% endif %} Producto{% endblock %}

{% block content %}
<h1 class="mb-4">{% if form.instance.pk %}Editar{% else %}Nuevo{% endif %} Producto</h1>

<form method="post" class="row g-3">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="col-12">
        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="{% url 'catalog:product_list' %}" class="btn btn-outline-secondary">Cancelar</a>
    </div>
</form>
{% endblock %}
