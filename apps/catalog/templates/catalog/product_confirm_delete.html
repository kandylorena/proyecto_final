{% extends 'base.html' %}

{% block title %}Eliminar Producto{% endblock %}

{% block content %}
<h1>Confirmar Eliminación</h1>
<p>¿Estás seguro de eliminar <strong>"{{ product.name }}"</strong>? Esta acción no se puede deshacer.</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Sí, eliminar</button>
    <a href="{% url 'catalog:product_list' %}" class="btn btn-outline-secondary">Cancelar</a>
</form>
{% endblock %}
